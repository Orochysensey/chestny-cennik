name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # КЛЮЧЕВОЙ ШАГ: устанавливаем совместимые версии autotools
    - name: Fix autotools versions for libffi
      run: |
        sudo apt update
        sudo apt install -y autoconf-archive
        sudo apt install -y autoconf=2.69-11.1 automake=1:1.16.3-2 libtool=2.4.6-15

    - name: Install buildozer
      run: |
        sudo apt install -y openjdk-17-jdk
        pip install buildozer cython

    - name: Build APK
      run: |
        echo "y" | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: honestprice
        path: bin/*.apk
