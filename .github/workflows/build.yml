name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip zip
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools
        mv cmdline-tools cmdline-tools-old 2>/dev/null || true
        mv latest cmdline-tools/ 2>/dev/null || true
        echo y | cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
        cmdline-tools/latest/bin/sdkmanager "platforms;android-30" "build-tools;30.0.3" "ndk;25.1.8937393" > /dev/null 2>&1
    - name: Install buildozer
      run: |
        pip install buildozer cython
    - name: Build APK
      env:
        ANDROID_HOME: $HOME/android-sdk
        ANDROID_SDK_ROOT: $HOME/android-sdk
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = Честный ценник
package.name = honestprice
package.domain = org.example
source.dir = .
source.include_exts = py,png
version = 1.0.0
requirements = python3,kivy
orientation = portrait
fullscreen = 0
android.permissions = INTERNET
android.api = 30
android.minapi = 21
android.ndk = 25b
android.sdk = 30
log_level = 2

[buildozer]
android_sdk_dir = $HOME/android-sdk
android_ndk_dir = $HOME/android-sdk/ndk/25.1.8937393
EOF
        yes y | buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: honestprice
        path: bin/*.apk
