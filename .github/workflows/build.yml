name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install buildozer
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk
        pip install buildozer cython
    - name: Build APK
      run: |
        # Создаём expect-скрипт для автоматического ответа
        cat > auto_build.exp << 'EOF'
        spawn buildozer android debug
        expect "Are you sure you want to continue [y/n]?"
        send "y\r"
        expect eof
        EOF
        chmod +x auto_build.exp
        sudo apt install -y expect
        ./auto_build.exp
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: honestprice
        path: bin/*.apk
