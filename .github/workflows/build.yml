name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk wget unzip zip
        pip install buildozer cython

    # Альтернативный способ: устанавливаем libffi из исходников без autotools
    - name: Fix libffi build
      run: |
        # Устанавливаем необходимые заголовки
        sudo apt install -y libffi-dev

    - name: Build APK
      run: |
        # Создаём упрощённый buildozer.spec
        cat > buildozer.spec << 'EOF'
[app]
title = Честный ценник
package.name = honestprice
package.domain = org.example
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,ttf,txt,json
version = 1.0.0
requirements = python3,kivy
orientation = portrait
fullscreen = 0
android.permissions = INTERNET
android.api = 30
android.minapi = 21
android.ndk = 23b
icon.filename = icon.png
presplash.filename = icon.png
log_level = 2

[buildozer]
android_ndk = 23b
EOF
        # Запускаем сборку с автоматическим ответом
        echo "y" | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: honestprice
        path: bin/*.apk
